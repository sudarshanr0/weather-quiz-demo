<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solo Quiz Live Game</title>
<style>
*{box-sizing:border-box}
body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;min-height:100vh;color:#ecfeff;background:radial-gradient(circle at 20% 15%,#1d4ed8 0%,#0f172a 45%,#020617 100%)}
header{max-width:1200px;margin:20px auto 0;padding:18px 24px;background:rgba(15,23,42,.85);border:1px solid rgba(148,163,184,.25);border-radius:18px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;backdrop-filter:blur(10px);box-shadow:0 16px 40px rgba(2,6,23,.35)}
.title{font-size:20px;font-weight:800;letter-spacing:.2px}
main{max-width:1200px;margin:0 auto;padding:20px}
.grid{display:grid;grid-template-columns:1.55fr 1fr;gap:18px}
@media(max-width:980px){header{margin:12px} .grid{grid-template-columns:1fr}}
.card{background:linear-gradient(160deg,rgba(15,23,42,.93),rgba(30,41,59,.86));border:1px solid rgba(148,163,184,.25);border-radius:20px;box-shadow:0 18px 36px rgba(2,6,23,.35);color:#f8fafc}
.card h2{margin:0;padding:18px 18px 8px;font-size:20px}
.body{padding:18px}
button{border:0;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer;transition:.2s transform,.2s box-shadow,.2s opacity}
button:hover{transform:translateY(-1px);box-shadow:0 10px 20px rgba(15,23,42,.3)}
button:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
.dark{background:linear-gradient(120deg,#2563eb,#4f46e5);color:#fff}
.light{background:rgba(15,23,42,.35);color:#e2e8f0;border:1px solid rgba(148,163,184,.35)}
.green{background:linear-gradient(120deg,#15803d,#16a34a);color:#fff}
.red{background:linear-gradient(120deg,#b91c1c,#ef4444);color:#fff}
input, select{width:100%;padding:12px;border:1px solid rgba(148,163,184,.45);border-radius:12px;background:rgba(15,23,42,.55);color:#f8fafc}
.opts button{display:block;width:100%;text-align:left;margin:10px 0;background:rgba(15,23,42,.5);border:1px solid rgba(148,163,184,.35);color:#f8fafc}
.small{color:#94a3b8;font-size:13px}
.score{width:100%;border-collapse:collapse}
.score td,.score th{padding:10px;border-bottom:1px solid rgba(148,163,184,.22)}
.score th{text-align:left;color:#93c5fd}
.badge{display:inline-block;padding:6px 12px;border-radius:999px;background:rgba(37,99,235,.24);border:1px solid rgba(147,197,253,.35);font-size:12px;font-weight:700;color:#dbeafe}
.timer{font-size:34px;font-weight:800;color:#fef08a;text-shadow:0 0 20px rgba(250,204,21,.35)}
.correct{color:#4ade80} .wrong{color:#f87171}
hr{border:none;border-top:1px solid rgba(148,163,184,.2);margin:18px 0}
.hero-line{display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin-top:14px}
.qr{width:180px;height:180px;border:1px solid rgba(148,163,184,.45);border-radius:12px;background:#fff;padding:4px;object-fit:contain}
.join-link{max-width:430px;word-break:break-all;padding:10px;border-radius:12px;background:rgba(15,23,42,.5);border:1px dashed rgba(148,163,184,.45)}
.actions{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap}
.qselect{margin-top:14px;display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:end}
@media(max-width:720px){.qselect{grid-template-columns:1fr}}
.scroll{max-height:260px;overflow:auto;border:1px solid rgba(148,163,184,.25);border-radius:12px;padding:8px}
.scroll{-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.item{padding:8px 10px;border-bottom:1px solid rgba(148,163,184,.15);cursor:pointer}
.item:hover{background:rgba(255,255,255,.04)}
.item.active{background:rgba(37,99,235,.18)}
</style>
</head>
<body>
<header>
  <div><div class="title">Solo Quiz Live Game (Firebase)</div><div class="small">15s timer • quickest correct answer scores highest • multi-device realtime</div></div>
  <div id="modeControls"></div>
</header>
<main><div id="app"></div></main>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc, onSnapshot, runTransaction } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBI-kJfFpBluI-4f8wqOcrgvQPVKGgWi3U",
  authDomain: "caos-openday-quiz.firebaseapp.com",
  projectId: "caos-openday-quiz",
  storageBucket: "caos-openday-quiz.firebasestorage.app",
  messagingSenderId: "790571453067",
  appId: "1:790571453067:web:417c77bfa58c11a5b2228e",
  measurementId: "G-GWZDYE2CH5"
};
const HOST_PASSWORD = 'ZIUQCAOS';

const cfgReady = firebaseConfig.apiKey && firebaseConfig.projectId && firebaseConfig.appId;
const app = cfgReady ? initializeApp(firebaseConfig) : null;
const db = cfgReady ? getFirestore(app) : null;

const userId = localStorage.userId || (localStorage.userId = 'u' + Math.random().toString(36).slice(2));
const url = new URL(location);
let mode = ['home','host','player'].includes(url.searchParams.get('mode')) ? url.searchParams.get('mode') : 'home';
let gamePin = url.searchParams.get('pin') || '';
const hashPin = (url.hash || '').replace('#', '').trim();
if (!gamePin && /^\d{6}$/.test(hashPin)) {
  gamePin = hashPin;
  mode = 'player';
}
let state = null;
let unsub = null;
let hostAccess = false;
let QUESTIONS = [];

async function loadQuestions() {
  const res = await fetch('./questions.json');
  if (!res.ok) throw new Error('questions.json not found');
  QUESTIONS = await res.json();
}

function refreshModeControls() {
  const el = document.getElementById('modeControls');
  el.innerHTML = `
    <button class="light" onclick="setMode('home')">Home</button>
    <button class="light" onclick="setMode('host')">Host</button>
    <button class="light" onclick="setMode('player')">Player</button>`;
}

function syncUrl() {
  const u = new URL(location);
  u.searchParams.set('mode', mode);
  if (gamePin) u.searchParams.set('pin', gamePin); else u.searchParams.delete('pin');
  history.replaceState(null, '', u);
}

function setMode(m) {
  if (m === 'host') return hostLogin();
  mode = m;
  syncUrl();
  attachListener();
  render();
}

function makePin() { return String(Math.floor(100000 + Math.random() * 900000)); }
function joinLink(pin) {
  return `${location.origin}${location.pathname}#${pin}`;
}
function qr(pin) {
  return 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=' + encodeURIComponent(joinLink(pin));
}

async function loadState() {
  const ref = gameRef();
  if (!ref) return null;
  const snap = await getDoc(ref);
  return snap.exists() ? snap.data() : null;
}

function gameRef() {
  if (!cfgReady || !db || !gamePin) return null;
  return doc(db, 'quizGames', gamePin);
}

async function saveState() {
  const ref = gameRef();
  if (!ref) return;
  await setDoc(ref, state, { merge: true });
}

function attachListener() {
  if (unsub) { unsub(); unsub = null; }
  if (!cfgReady || !db || !gamePin) return;
  const ref = doc(db, 'quizGames', gamePin);
  unsub = onSnapshot(ref, (snap) => {
    state = snap.exists() ? snap.data() : null;
    render();
  }, (err) => console.error(err));
}

async function createGame() {
  gamePin = makePin();
  state = {
    pin: gamePin,
    title: 'Solo Quiz',
    status: 'lobby',
    current: 0,
    questionStart: null,
    players: {},
    answered: {}
  };
  hostAccess = true;
  mode = 'host';
  syncUrl();
  await saveState();
  attachListener();
  render();
}

async function hostLogin() {
  const password = prompt('Enter host password');
  if (password !== HOST_PASSWORD) {
    if (password !== null) alert('Invalid host password.');
    return;
  }
  hostAccess = true;
  mode = 'host';
  if (!gamePin) {
    await createGame();
    return;
  }
  state = await loadState();
  if (!state) {
    await createGame();
    return;
  }
  syncUrl();
  attachListener();
  render();
}

async function startGame() {
  if (!state) return;
  state.status = 'live';
  state.questionStart = Date.now();
  state.answered = {};
  await saveState();
}

async function showQuestion(index) {
  if (!state) return;
  state.current = index;
  state.status = 'live';
  state.questionStart = Date.now();
  state.answered = {};
  await saveState();
}

async function nextQuestion() {
  if (!state) return;
  if (state.current < QUESTIONS.length - 1) {
    await showQuestion(state.current + 1);
  } else {
    state.status = 'finished';
    await saveState();
  }
}

async function addPlayer(name) {
  const ref = gameRef();
  if (!ref) return;
  if (!name) name = 'Player';
  await runTransaction(db, async (tx) => {
    const snap = await tx.get(ref);
    if (!snap.exists()) return;
    const next = snap.data();
    next.players = next.players || {};
    next.players[userId] = next.players[userId] || { name, score: 0 };
    next.players[userId].name = name;
    tx.set(ref, { players: next.players }, { merge: true });
  });
}

function remainingMs() {
  if (!state || state.status !== 'live' || !state.questionStart) return 15000;
  return Math.max(0, 15000 - (Date.now() - state.questionStart));
}

async function answerQuestion(idx) {
  const ref = gameRef();
  if (!ref) return;
  await runTransaction(db, async (tx) => {
    const snap = await tx.get(ref);
    if (!snap.exists()) return;
    const next = snap.data();
    if (next.status !== 'live') return;

    next.answered = next.answered || {};
    if (next.answered[userId]) return;

    const q = QUESTIONS[next.current];
    const elapsed = Date.now() - next.questionStart;
    const correct = idx === q.answerIndex;
    let points = 0;
    if (correct && elapsed <= 15000) points = Math.max(100, Math.round(1000 - elapsed / 10));

    next.players = next.players || {};
    next.players[userId] = next.players[userId] || { name: 'Player', score: 0 };
    next.players[userId].score += points;
    next.answered[userId] = { idx, elapsed, correct, points };

    tx.set(ref, { players: next.players, answered: next.answered }, { merge: true });
  });
}

function updateLiveTimers() {
  if (!state || state.status !== 'live') return;
  const seconds = `${Math.ceil(remainingMs()/1000)}s`;
  document.querySelectorAll('[data-role="timer"]').forEach((el) => {
    el.textContent = seconds;
  });
}

setInterval(updateLiveTimers, 250);

function homeView() {
  return `
  <div class="card">
    <h2>Welcome</h2>
    <div class="body">
      <p class="small">Questions come from the final solo-quiz PDF and are renumbered 1–75.</p>
      <div class="actions">
        <button class="dark" onclick="setMode('host')">Host</button>
        <button class="light" onclick="setMode('player')">Player</button>
      </div>
    </div>
  </div>`;
}

function hostView() {
  if (!state) return `<div class="card"><h2>Host</h2><div class="body"><button class="dark" onclick="createGame()">Create Game</button></div></div>`;
  const q = QUESTIONS[state.current];
  return `
  <div class="card">
    <h2>Host Console</h2>
    <div class="body">
      <div class="badge">GAME PIN: ${gamePin}</div>
      <div class="hero-line">
        <img src="${qr(gamePin)}" class="qr" alt="QR code">
        <div>
          <div class="small">Players join via QR or link</div>
          <div class="join-link">${joinLink(gamePin)}</div>
        </div>
      </div>
      <div class="actions">
        <button class="dark" onclick="startGame()">Start current question</button>
        <button class="green" onclick="nextQuestion()">Next Question</button>
      </div>
      <div class="qselect">
        <div>
          <div class="small">Choose any question to display</div>
          <select id="qpicker">${QUESTIONS.map((q,i)=>`<option value="${i}" ${i===state.current?'selected':''}>Q${q.num} — ${q.question}</option>`).join('')}</select>
        </div>
        <button class="light" onclick="showQuestion(parseInt(document.getElementById('qpicker').value,10))">Show Selected</button>
        <button class="red" onclick="state.status='finished'; saveState()">Finish</button>
      </div>
      <div style="margin-top:16px" class="timer" data-role="timer">${Math.ceil(remainingMs()/1000)}s</div>
      <div class="small">Quickest correct answer within 10 seconds gets more points.</div>
      <hr>
      <div class="small">Question ${state.current+1} / ${QUESTIONS.length}</div>
      <h3>${q.question}</h3>
      <ol type="A">${q.options.map(o=>`<li>${o}</li>`).join('')}</ol>
      <div class="small">Correct: ${'ABCD'[q.answerIndex]}. ${q.options[q.answerIndex]}</div>
      <hr>
      <div class="small">All questions</div>
      <div class="scroll">${QUESTIONS.map((qq,i)=>`<div class="item ${i===state.current?'active':''}" onclick="showQuestion(${i})"><strong>Q${qq.num}</strong> — ${qq.question}</div>`).join('')}</div>
    </div>
  </div>`;
}

function playerView() {
  if (!gamePin) {
    return `<div class="card"><h2>Join as Player</h2><div class="body"><div class="small">Scan the host QR code to join instantly, or open the host-shared link.</div></div></div>`;
  }
  if (!state) return `<div class="card"><h2>Join Game</h2><div class="body"><div class="small">Loading game…</div></div></div>`;
  const q = QUESTIONS[state.current];
  const me = (state.players||{})[userId];
  const answered = (state.answered||{})[userId];
  return `
  <div class="card">
    <h2>Player</h2>
    <div class="body">
      ${!me ? `<div><input id="name" placeholder="Your name"><button class="dark" style="margin-top:10px" onclick="addPlayer(document.getElementById('name').value || 'Player')">Enter</button></div>` : `
      <div class="badge">${me.name}</div>
      <div style="margin-top:10px" class="timer" data-role="timer">${Math.ceil(remainingMs()/1000)}s</div>
      <div class="small">Question ${state.current+1} / ${QUESTIONS.length}</div>
      <h3>${q.question}</h3>
      <div class="opts">
        ${q.options.map((o,i)=>`<button onclick="answerQuestion(${i})" ${answered?'disabled':''}>${'ABCD'[i]}. ${o}</button>`).join('')}
      </div>
      ${answered ? `<div class="${answered.correct?'correct':'wrong'}" style="margin-top:12px;font-weight:700">${answered.correct?'Correct':'Incorrect'} • +${answered.points} pts</div>` : ''}
      <div style="margin-top:10px" class="small">Your score: ${me.score}</div>`}
    </div>
  </div>`;
}

function scoreboard() {
  if (!state) return '';
  const rows = Object.entries(state.players||{}).map(([uid,p])=>({name:p.name, score:p.score})).sort((a,b)=>b.score-a.score);
  return `
  <div class="card">
    <h2>Scoreboard</h2>
    <div class="body">
      <table class="score">
        <thead><tr><th>Rank</th><th>Name</th><th>Score</th></tr></thead>
        <tbody>${rows.map((r,i)=>`<tr><td>${i+1}</td><td>${r.name}</td><td>${r.score}</td></tr>`).join('')}</tbody>
      </table>
    </div>
  </div>`;
}

function render() {
  refreshModeControls();
  document.getElementById('app').innerHTML = `
    <div class="grid">
      <div>${mode==='home' ? homeView() : (mode==='host' ? hostView() : playerView())}</div>
      <div>${mode==='home' ? '' : scoreboard()}</div>
    </div>`;
}

async function init() {
  await loadQuestions();
  syncUrl();
  attachListener();
  if (gamePin && cfgReady) state = await loadState();
  render();
}

init();
window.setMode = setMode;
window.hostLogin = hostLogin;
window.createGame = createGame;
window.startGame = startGame;
window.nextQuestion = nextQuestion;
window.showQuestion = showQuestion;
window.addPlayer = addPlayer;
window.answerQuestion = answerQuestion;
window.saveState = saveState;
</script>
</body>
</html>
