const HOST_PASSWORD = 'ZIUQCAOS';
const userId = localStorage.userId || (localStorage.userId = 'u' + Math.random().toString(36).slice(2));
const url = new URL(location);
const requestedMode = url.searchParams.get('mode') || 'home';
let mode = ['home','host','player'].includes(requestedMode) ? requestedMode : 'home';
let gamePin = url.searchParams.get('pin') || '';
let state = null;
let unsub = null;
let hostAccess = false;

function refreshModeControls(){
  const el = document.getElementById('modeControls');
  if(!el) return;
  if(mode==='home'){
    el.innerHTML = '';
    return;
  }
  el.innerHTML = `<button class="light" onclick="setMode('home')">Home</button>`;
}
function setMode(m){
  if(m==='host'){
    hostLogin();
    return;
  }
  mode=m;
  syncUrl();
  attachListener();
  render();
}
function syncUrl(){
  const u=new URL(location);
  u.searchParams.set('mode', mode);
  if(gamePin) u.searchParams.set('pin',gamePin); else u.searchParams.delete('pin');
  history.replaceState(null,'',u);
}
function makePin(){ return String(Math.floor(100000 + Math.random()*900000)); }
function joinLink(pin){ const u=new URL(location); u.searchParams.set('mode','player'); u.searchParams.set('pin',pin); u.searchParams.delete('hk'); return u.toString(); }
function qr(pin){ return 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='+encodeURIComponent(joinLink(pin)); }

async function hostLogin(){
  const password = prompt('Enter host password');
  if(password !== HOST_PASSWORD){
    if(password !== null) alert('Invalid host password.');
    return;
  }
  hostAccess = true;
  mode = 'host';
  if(gamePin && cfgReady){
    state = await loadState();
  }
  syncUrl();
  attachListener();
  render();
}

async function loadState(){
  if(!cfgReady || !db || !gamePin) return null;
  const ref = doc(db, 'quizGames', gamePin);
  const snap = await getDoc(ref);
  return snap.exists() ? snap.data() : null;
}
async function saveState(){
  const ref = doc(db, 'quizGames', gamePin);
  await setDoc(ref, state, { merge: true });
}
async function patchState(patch){
  const ref = doc(db, 'quizGames', gamePin);
  await updateDoc(ref, patch);
}
function attachListener(){
  if(unsub){ unsub(); unsub = null; }
  if(!cfgReady || !db || !gamePin) return;
  const ref = doc(db, 'quizGames', gamePin);
  unsub = onSnapshot(ref, (snap) => {
    state = snap.exists() ? snap.data() : null;
    render();
  });
}

async function createGame(){
  gamePin = makePin();
  hostAccess = true;
  hostKey = makeHostKey();
  localStorage.setItem(hostStorageKey(gamePin), hostKey);
  state = {
    pin: gamePin,
    hostKey,
    title: 'Solo Quiz',
    status: 'lobby',
    current: 0,
    questionStart: null,
    players: {},
    answered: {}
  };
  syncUrl();
  await saveState();
  attachListener();
  render();
}
async function startGame(){
  state.status='live';
  state.current=0;
  state.questionStart=Date.now();
  state.answered={};
  await saveState();
}
async function nextQuestion(){
  if(state.current < QUESTIONS.length - 1){
    state.current += 1;
    state.questionStart = Date.now();
    state.answered = {};
    await saveState();
  } else {
    state.status = 'finished';
    await saveState();
  }
}
async function addPlayer(name){
  if(!name) name = 'Player';
  const players = state.players || {};
  players[userId] = players[userId] || { name, score: 0 };
  players[userId].name = name;
  state.players = players;
  await saveState();
}
function remainingMs(){
  if(!state || state.status!=='live' || !state.questionStart) return 10000;
  return Math.max(0, 10000 - (Date.now() - state.questionStart));
}
async function answerQuestion(idx){
  if(!state || state.status!=='live') return;
  if((state.answered||{})[userId]) return;
  const q = QUESTIONS[state.current];
  const elapsed = Date.now() - state.questionStart;
  const correct = idx === q.answerIndex;
  let points = 0;
  if(correct && elapsed <= 10000){
    points = Math.max(100, Math.round(1000 - elapsed/10));
  }
  const players = state.players || {};
  players[userId] = players[userId] || { name: 'Player', score: 0 };
  players[userId].score += points;

  const answered = state.answered || {};
  answered[userId] = { idx, elapsed, correct, points };
  state.players = players;
  state.answered = answered;
  await saveState();
}

setInterval(() => { if(state && state.status==='live') render(); }, 250);

      <div class="small">Scoring: only correct answers within 10 seconds score points; faster answers score more.</div>
      <hr>
      <div class="small">Question ${state.current+1} / ${QUESTIONS.length}</div>
      <h3>${q.question}</h3>
      <ol type="A">${q.options.map(o => `<li>${o}</li>`).join('')}</ol>
      <div class="small">Correct: ${'ABCD'[q.answerIndex]}. ${q.options[q.answerIndex]}</div>
    </div>
  </div>`;
}
function playerView(){
  if(!cfgReady) return configCard();
  if(!gamePin){
    return `<div class="card"><h2>Join as Player</h2><div class="body">
      <div class="small">Scan the QR code shown on the host screen to join instantly. The link includes the game PIN automatically.</div>
    </div></div>`;
  }
  if(!state) return `<div class="card"><h2>Join Game</h2><div class="body"><div class="small">Loading game…</div></div></div>`;
  const q = QUESTIONS[state.current];
  const me = (state.players||{})[userId];
  const answered = (state.answered||{})[userId];
  return `
  <div class="card">
    <h2>Player</h2>
    <div class="body">
      ${!me ? `<div>
        <input id="name" placeholder="Your name">
        <button class="dark" style="margin-top:10px" onclick="addPlayer(document.getElementById('name').value || 'Player')">Enter</button>
      </div>` : `
      <div class="badge">${me.name}</div>
      <div style="margin-top:10px" class="timer">${Math.ceil(remainingMs()/1000)}s</div>
      <div class="small">Question ${state.current+1} / ${QUESTIONS.length}</div>
      <h3>${q.question}</h3>
      <div class="opts">
        ${q.options.map((o,i)=>`<button onclick="answerQuestion(${i})" ${answered?'disabled':''}>${'ABCD'[i]}. ${o}</button>`).join('')}
      </div>
      ${answered ? `<div class="${answered.correct?'correct':'wrong'}" style="margin-top:12px;font-weight:700">${answered.correct?'Correct':'Incorrect'} • +${answered.points} pts</div>`:''}
      <div style="margin-top:10px" class="small">Your score: ${me.score}</div>`}
    </div>
  </div>`;
}
function scoreboard(){
  if(!state) return '';
  const rows = Object.entries(state.players||{}).map(([uid,p])=>({name:p.name, score:p.score})).sort((a,b)=>b.score-a.score);
  return `
  <div class="card">
    <h2>Scoreboard</h2>
    <div class="body">
      <table class="score">
        <thead><tr><th>Rank</th><th>Name</th><th>Score</th></tr></thead>
        <tbody>${rows.map((r,i)=>`<tr><td>${i+1}</td><td>${r.name}</td><td>${r.score}</td></tr>`).join('')}</tbody>
      </table>
    </div>
  </div>`;
}
function render(){
  refreshModeControls();
  document.getElementById('app').innerHTML = `
  <div class="grid">
    <div>${mode==='home' ? homeView() : (mode==='host' ? hostView() : playerView())}</div>
    <div>${mode==='home' ? '' : scoreboard()}</div>
  </div>`;
}
async function init(){
  if(mode==='host'){
    mode = 'home';
  }
  syncUrl();
  attachListener();
  if(gamePin && cfgReady){
    state = await loadState();
  }
  render();
}
init();
window.hostLogin=hostLogin;
window.setMode=setMode;
window.createGame=createGame;
window.startGame=startGame;
window.nextQuestion=nextQuestion;
window.addPlayer=addPlayer;
window.answerQuestion=answerQuestion;
</script>
</body>
</html>
